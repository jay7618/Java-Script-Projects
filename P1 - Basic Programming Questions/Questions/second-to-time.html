<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take Seconds and Convert into Time</title>
</head>
<body>
    
    <h1>Take Seconds and Convert into Time (Celsius to Fahrenheit)</h1>
    <br><br>
    <h4 id="seconds">Seconds : </h4>
    <br><br>
    <h4 id="time">Time : </h4>

    <script>

        let send = Number(prompt("Enter Seconds : "))

        let dsend = document.getElementById("seconds")
        let dtime = document.getElementById("time")

        let hours = Math.floor(send / 3600)
        let remSend = send - (hours*3600)
        let minutes = Math.floor(remSend / 60)
        let seconds = remSend - (minutes*60)

        dsend.innerText = `Seconds : ${send}`
        dtime.innerText = `Time = ${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`

    </script>

</body>
</html>
