<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
</head>
<body>
    
    <h1>Temperature Converter (Celsius to Fahrenheit)</h1>
    <br><br>
    <h4 id="cels">Temperature in Celsius : </h4>
    <br><br>
    <h4 id="fahr">Temperature in Fahrenheit : </h4>

    <script>

        let cels = Number(prompt("Enter Temperature in Celsius : "))

        let dcels = document.getElementById("cels")
        let dfahr = document.getElementById("fahr")

        let fahr = (cels * 9/5) + 32

        dcels.innerText = `Temperature in Celsius : ${cels}`
        dfahr.innerText = `Temperature in Fahrenheit = ${fahr}`

    </script>

</body>
</html>
