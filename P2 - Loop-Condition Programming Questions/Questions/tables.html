<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplication Table</title>
</head>
<body>
    <h1>Multiplication Table</h1>
    <br>
    <h2 id="table">Table of : </h2>
    <h2 id="ans"></h2>

    <script>

        let no = Number(prompt("Enter Any No : "))
        let ans = ""

        for(let i = 1;i <= 10;i++) {
            ans = no*i
            document.getElementById("ans").innerHTML =document.getElementById("ans").innerHTML + `${no} x ${i} = ${ans} <br>`
        }

    </script>
    
</body>
</html>
